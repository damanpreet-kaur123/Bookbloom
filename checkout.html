<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<style>
   body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, purple, blueviolet);
}


h1 {
    text-align: center;
    color: white;
    margin-top: 20px;
}

h2 {
    text-align: center;
    color: #f2f2f2;
    margin-bottom: 10px;
}


form {
    max-width: 450px;
    margin: 30px auto;
    background: #ffffff;
    padding: 25px 30px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}


form input,
form textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
}


form input:focus,
form textarea:focus {
    border-color: #8e2de2;
    outline: none;
    box-shadow: 0 0 5px rgba(142, 45, 226, 0.3);
}


h3 {
    margin-top: 20px;
    margin-bottom: 10px;
    color: #333;
}


form label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 15px;
}


form input[type="radio"] {
    width: auto;
    margin: 0;
    transform: scale(1.2);
    cursor: pointer;
    margin-left: 150px;
}

#upi,
#card {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
}


button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #28a745, #218838);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}


button:hover {
    transform: scale(1.02);
    background: linear-gradient(to right, #218838, #1e7e34);
}


@media (max-width: 500px) {
    form {
        margin: 20px;
        padding: 20px;
    }
}
</style>
</head>
<body>
<div class="check">
<h1>Checkout</h1>

<h2>Customer Details</h2>
<form onsubmit="placeOrder(event)">
<input type="text" id="name" placeholder="Full Name"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="text" id="phone" placeholder="Phone"><br><br>
<textarea id="address" placeholder="Address"></textarea><br><br>

<h3>Payment Method</h3>

<label>
<input type="radio" name="payment" value="cod" checked onclick="showPayment()"> Cash on Delivery
</label><br>

<label>
<input type="radio" name="payment" value="upi" onclick="showPayment()"> UPI Payment
</label><br>

<label>
<input type="radio" name="payment" value="card" onclick="showPayment()"> Card Payment
</label><br><br>

<div id="upi-section" style="display:none;">
<h3>UPI Payment</h3>
<p>UPI ID: <b>shop@upi</b></p>
<input type="text" id="upi-txn" placeholder="Enter UPI Transaction ID">
</div>

<div id="card-section" style="display:none;">
<h3>Card Payment</h3>
<input type="text" id="card-number" placeholder="Card Number"><br><br>
<input type="text" id="expiry" placeholder="MM/YY"><br><br>
<input type="password" id="cvv" placeholder="CVV">
</div>

<br>
<button type="button" onclick="placeOrder()">Pay & Place Order</button>
</form>

<script src="script.js"></script>
</div>
</body>
</html>
